name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish via release
        required: true

permissions:
  contents: write

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo test
        run: cargo test --locked

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-14
    needs: tests
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            target: x86_64-apple-darwin
          - arch: arm64
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: |
          cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          BINARY="garmin-darwin-${{ matrix.arch }}"
          cp target/${{ matrix.target }}/release/garmin "dist/${BINARY}" 2>/dev/null || {
            mkdir -p dist
            cp target/${{ matrix.target }}/release/garmin "dist/${BINARY}"
          }
          chmod +x "dist/${BINARY}"
          tar -C dist -czf "dist/${BINARY}.tar.gz" "${BINARY}"
          rm "dist/${BINARY}"
          (cd dist && shasum -a 256 "${BINARY}.tar.gz" > "${BINARY}.tar.gz.sha256")
      - name: Smoke test (arm64 only)
        if: matrix.arch == 'arm64'
        run: |
          tar -xzf dist/garmin-darwin-arm64.tar.gz -C dist
          ./dist/garmin-darwin-arm64 --help >/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: tests
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            use_cross: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          BINARY="garmin-linux-${{ matrix.arch }}"
          cp target/${{ matrix.target }}/release/garmin "dist/${BINARY}"
          chmod +x "dist/${BINARY}"
          tar -C dist -czf "dist/${BINARY}.tar.gz" "${BINARY}"
          rm "dist/${BINARY}"
          (cd dist && sha256sum "${BINARY}.tar.gz" > "${BINARY}.tar.gz.sha256")
      - name: Smoke test (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          tar -xzf dist/garmin-linux-amd64.tar.gz -C dist
          ./dist/garmin-linux-amd64 --help >/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/*

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: tests
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish --locked -p garmin-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-linux
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f -name '*.tar.gz' -exec mv {} release-files/ \;
          find artifacts -type f -name '*.sha256' -exec cat {} \; > release-files/checksums.txt
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        if: steps.tag.outputs.value != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/*.tar.gz
            release-files/*.sha256
            release-files/checksums.txt
          tag_name: ${{ steps.tag.outputs.value }}

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: release
    if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    env:
      HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY || 'vicentereig/homebrew-garmin-cli' }}
      HOMEBREW_FORMULA_NAME: garmin
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Update formula
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.value }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/vicentereig/garmin-cli/releases/download/${TAG}"
          FORMULA_DIR="homebrew-tap/Formula"
          FORMULA="${FORMULA_DIR}/${HOMEBREW_FORMULA_NAME}.rb"
          CHECKSUMS=$(curl -fsSL "${BASE_URL}/checksums.txt")

          DARWIN_AMD64=$(echo "$CHECKSUMS" | awk '/garmin-darwin-amd64\.tar\.gz$/ {print $1}')
          DARWIN_ARM64=$(echo "$CHECKSUMS" | awk '/garmin-darwin-arm64\.tar\.gz$/ {print $1}')
          LINUX_AMD64=$(echo "$CHECKSUMS" | awk '/garmin-linux-amd64\.tar\.gz$/ {print $1}')
          LINUX_ARM64=$(echo "$CHECKSUMS" | awk '/garmin-linux-arm64\.tar\.gz$/ {print $1}')

          for checksum in \
            "$DARWIN_AMD64" \
            "$DARWIN_ARM64" \
            "$LINUX_AMD64" \
            "$LINUX_ARM64"
          do
            if [ -z "$checksum" ]; then
              echo "Missing checksum in checksums.txt"
              exit 1
            fi
          done

          mkdir -p "$FORMULA_DIR"
          cat > "$FORMULA" <<EOF
          class Garmin < Formula
            desc "CLI for Garmin Connect API - activities, health metrics, and more"
            homepage "https://github.com/vicentereig/garmin-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_intel do
                url "${BASE_URL}/garmin-darwin-amd64.tar.gz"
                sha256 "${DARWIN_AMD64}"
              end
              on_arm do
                url "${BASE_URL}/garmin-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "${BASE_URL}/garmin-linux-amd64.tar.gz"
                sha256 "${LINUX_AMD64}"
              end
              on_arm do
                url "${BASE_URL}/garmin-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64}"
              end
            end

            def install
              if OS.mac?
                if Hardware::CPU.intel?
                  bin.install "garmin-darwin-amd64" => "garmin"
                else
                  bin.install "garmin-darwin-arm64" => "garmin"
                end
              elsif OS.linux?
                if Hardware::CPU.intel?
                  bin.install "garmin-linux-amd64" => "garmin"
                else
                  bin.install "garmin-linux-arm64" => "garmin"
                end
              end
            end

            test do
              assert_match "garmin", shell_output("#{bin}/garmin --help")
            end
          end
          EOF
      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${HOMEBREW_FORMULA_NAME}.rb"
          git diff --staged --quiet || git commit -m "Update garmin to ${{ steps.tag.outputs.value }}"
          git push
